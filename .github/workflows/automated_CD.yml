name: Contenarisation and Deployment on Cineca Galileo100 Cluster

on:
  workflow_run:
    workflows: ["C++ CMake Build and Test CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-on-galileo100:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code at the tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

