name: Containerisation and Deployment on Cineca Galileo100 Cluster

on:
  workflow_run:
    workflows: ["C++ CMake Build and Test CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-on-galileo100:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code at the tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install SSH and OTP tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            openssh-client sshpass oathtool

      - name: Configure SSH
        env:
          GALILEO_HOST: ${{ secrets.GALILEO_HOST }}
          GALILEO_USER: ${{ secrets.GALILEO_USER }}
          GALILEO_SSH_KEY: ${{ secrets.GALILEO_SSH_KEY }}
          GALILEO_SSH_PORT: ${{ secrets.GALILEO_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$GALILEO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Specify port explicitly in case Galileo uses non-standard port
          ssh-keyscan -p "${GALILEO_SSH_PORT:-22}" -H "$GALILEO_HOST" >> ~/.ssh/known_hosts

      - name: Sync and deploy
        env:
          GALILEO_HOST: ${{ secrets.GALILEO_HOST }}
          GALILEO_USER: ${{ secrets.GALILEO_USER }}
          GALILEO_SSH_PORT: ${{ secrets.GALILEO_SSH_PORT }}
          GALILEO_TOTP_SEED: ${{ secrets.GALILEO_TOTP_SEED }}
        run: |
          set -euo pipefail

          SSH_PORT="${GALILEO_SSH_PORT:-22}"
          SSH_CTRL="$HOME/.ssh/ctrl-%C"

          SSH_OPTS=(
            -p "$SSH_PORT"
            -o BatchMode=no
            -o StrictHostKeyChecking=yes
            -o PreferredAuthentications=publickey,keyboard-interactive
            -o NumberOfPasswordPrompts=1
            -o ControlMaster=auto
            -o "ControlPath=$SSH_CTRL"
            -o ControlPersist=120
          )

          # Generate OTP as late as possible — 30s window is tight
          OTP="$(oathtool --totp -b "$GALILEO_TOTP_SEED")"

          # Open the master connection in the background (-f) with no command (-N).
          # sshpass feeds the OTP to the keyboard-interactive prompt.
          # Without -f -N the runner would hang waiting for the session to close.
          sshpass -p "$OTP" \
            ssh "${SSH_OPTS[@]}" -o ControlMaster=yes -f -N \
            "$GALILEO_USER@$GALILEO_HOST"

          # rsync reuses the already-authenticated socket — no OTP needed again
          rsync -az --delete \
            -e "ssh -p $SSH_PORT -o ControlPath=$SSH_CTRL -o ControlMaster=no" \
            ./ "$GALILEO_USER@$GALILEO_HOST:/g100/home/userexternal/tgrimald/"

          # Remote execution also reuses the socket
          ssh -p "$SSH_PORT" \
              -o "ControlPath=$SSH_CTRL" \
              -o ControlMaster=no \
              "$GALILEO_USER@$GALILEO_HOST" bash -lc "
                set -euo pipefail
                cd \"/g100/home/userexternal/tgrimald/"
                chmod +x build.sh script.sh
                ./build.sh
                ./script.sh
              "

          # Close the master socket cleanly
          ssh -p "$SSH_PORT" \
              -o "ControlPath=$SSH_CTRL" \
              -o ControlMaster=no \
              -O exit "$GALILEO_USER@$GALILEO_HOST" || true
