### TEST FOR CINECA'S GITLAB CI PIPELINE TO SUBMIT A JOB TO THE GALILEO CLUSTER USING SLURM
stages:
  - test_cluster_submission

submit_test_job:
  stage: test_cluster_submission
  # Prepend the exact dependency proxy variable to the hpc-service image name
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/hpc-service:latest
  tags:
    - x86_64
    - cpu
    - docker
  script:
    - echo "Successfully booted inside Cineca's official hpc-service image!"
    - echo "Submitting test script to the Galileo Slurm queue..."
    
    # Fire the actual submission command
    - hpc-service submit --script submit_job.sh