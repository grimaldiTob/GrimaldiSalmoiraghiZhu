### TEST FOR CINECA'S GITLAB CI PIPELINE TO SUBMIT A JOB TO THE GALILEO CLUSTER USING SLURM
stages:
  - test_cluster_submission

submit_test_job:
  stage: test_cluster_submission
  # Use the local name precisely as Cineca expects it
  image:
    name: hpc-service
    pull_policy: if-not-present # <-- CRITICAL: Forces it to use the local copy without checking the internet
  tags:
    - x86_64
    - cpu
    - docker
  script:
    - echo "Testing pipeline via local pre-cached Cineca image..."
    - echo "Attempting to pass submit_job.sh to Galileo Slurm queue..."
    
    # Execute the submission
    - hpc-service submit --script submit_job.sh