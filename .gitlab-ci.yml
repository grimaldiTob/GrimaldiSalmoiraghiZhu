### TEST FOR CINECA'S GITLAB CI PIPELINE TO SUBMIT A JOB TO THE GALILEO CLUSTER USING SLURM
stages:
  - test_cluster_submission

submit_test_job:
  stage: test_cluster_submission
  # Point to Cineca's official internal container registry image
  image: registry.gitlab.hpc.cineca.it/hpc/hpc-service:latest
  tags:
    - x86_64
    - cpu
    - docker  # Matches runner #120 / #121 exactly from your screenshot
  script:
    - echo "Testing pipeline path via Cineca's official image..."
    - echo "Attempting to pass submit_job.sh to Galileo Slurm queue..."
    
    # Try calling the tool now that we are in the correct image environment
    - hpc-service submit --script submit_job.sh