# .gitlab-ci.yml
stages:
  - build_container
  - publish

build_apptainer:
  stage: build_container
  image:
    name: kaczmarj/apptainer
    entrypoint: [""]
  tags:
    - x86_64
    - cpu
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - apptainer build --fakeroot singularity/astralog.sif singularity/Singularity.def
  artifacts:
    paths:
      - singularity/astralog.sif
    expire_in: 1 hour

publish_sif:
  stage: publish
  image: curlimages/curl:latest
  tags:
    - x86_64
    - cpu
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  dependencies:
    - build_apptainer
  script:
    # Carica il .sif sul Generic Package Registry di GitLab
    # VERSION usa lo short SHA del commit come identificatore univoco
    - VERSION="${CI_COMMIT_SHORT_SHA}"
    - |
      curl --fail \
           --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file singularity/astralog.sif \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/astralog-sif/${VERSION}/astralog.sif"
    # Aggiorna anche il puntatore "latest" per semplicità
    - |
      curl --fail \
           --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file singularity/astralog.sif \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/astralog-sif/latest/astralog.sif"
