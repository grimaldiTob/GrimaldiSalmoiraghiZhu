### TEST FOR CINECA'S GITLAB CI PIPELINE TO SUBMIT A JOB TO THE GALILEO CLUSTER USING SLURM
stages:
  - test_cluster_submission

submit_test_job:
  stage: test_cluster_submission
  image: python:3.10-slim
  tags:
    - x86_64
    - cpu
    - docker
  script:
    - echo "Testing pipeline path..."
    - echo "Attempting to pass submit_job.sh to Galileo Slurm queue..."
    
    # Run the pre-installed cineca tool command from the runner host shell
    - hpc-service submit --script submit_job.sh