### TEST FOR CINECA'S GITLAB CI PIPELINE TO SUBMIT A JOB TO THE GALILEO CLUSTER USING SLURM
stages:
  - test_cluster_submission

submit_test_job:
  stage: test_cluster_submission
  image: python:3.10-slim
  tags:
    - x86_64
    - cpu
    - docker
  before_script:
    # First, update the slim container to make sure we have networking tools
    - apt-get update -y && apt-get install -y wget curl
  script:
    - echo "=== 1. Searching for Cineca's Internal Tool Repositories ==="
    # This checks if the hpc-service codebase is hosted as a public internal project we can pull
    - curl -sSfI https://gitlab.hpc.cineca.it/hpc/hpc-service || echo "Repository path not directly exposed via web UI"
    
    - echo "=== 2. Attempting a Python-Native Submission Alternative ==="
    # If hpc-service is just a wrapper for an internal REST API endpoint, 
    # we can call Cineca's automation portal endpoint directly using a raw python payload instead.
    - python3 -c '
import urllib.request
import os
print("Verifying secure connection to internal GitLab API infrastructure...")
try:
    response = urllib.request.urlopen("https://gitlab.hpc.cineca.it/api/v4/version", timeout=5)
    print("Connection successful! Status Code:", response.getcode())
except Exception as e:
    print("Internal API routing blocked:", e)
'