### TEST FOR CINECA'S GITLAB CI PIPELINE TO SUBMIT A JOB TO THE GALILEO CLUSTER USING SLURM
stages:
  - test_cluster_submission

submit_test_job:
  stage: test_cluster_submission
  # Use the standard image that always pulls successfully
  image: python:3.10-slim
  tags:
    - x86_64
    - cpu
    - docker
  script:
    - echo "Fetching hpc-service utility from Cineca's internal server..."
    # Download the client tool directly from the internal GitLab server's local file area
    - curl -sSfk https://gitlab.hpc.cineca.it/hpc/hpc-service/-/raw/main/hpc-service -o /usr/local/bin/hpc-service || curl -sSfk https://gitlab.hpc.cineca.it/assets/hpc-service -o /usr/local/bin/hpc-service || true
    
    # Let's verify if we fetched it or if it's already hidden in a known system binary folder
    - chmod +x /usr/local/bin/hpc-service 2>/dev/null || true
    
    - echo "Checking tool status..."
    - which hpc-service || echo "Tool not found in path, attempting execution via fallback..."
    
    - echo "Attempting submission to Galileo Slurm queue..."
    - hpc-service submit --script submit_job.sh || python3 /usr/local/bin/hpc-service submit --script submit_job.sh